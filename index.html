<!DOCTYPE html>
<html>
<head>
    <title>Faculty Accomplishments Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tab-button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background-color: #2c3e50;
            color: white;
            margin: 0 5px;
            border-radius: 5px;
        }

        .tab-button.active {
            background-color: #1abc9c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            overflow-x: auto;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        a {
            color: #1abc9c;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Faculty Accomplishments Dashboard</h2>

<div class="tabs">
    <button class="tab-button active" onclick="loadTab('before', this)">Before Joining</button>
    <button class="tab-button" onclick="loadTab('after', this)">After Joining</button>
    <button class="tab-button" onclick="loadTab('additional', this)">Additional Links</button>
</div>

<table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
</table>

<script>

let jsonData = {};

fetch('data.json')
    .then(response => response.json())
    .then(data => {
        jsonData = data;
        loadTab('before', document.querySelector('.tab-button'));
    });

function loadTab(tabName, element) {

    document.querySelectorAll('.tab-button')
        .forEach(btn => btn.classList.remove('active'));

    element.classList.add('active');

    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');

    tableHead.innerHTML = '';
    tableBody.innerHTML = '';

    const data = jsonData[tabName];

    if (!data || data.length === 0) return;

    // Create table headers dynamically
    const headers = Object.keys(data[0]);
    let headerRow = '<tr>';
    headers.forEach(header => {
        headerRow += `<th>${header}</th>`;
    });
    headerRow += '</tr>';
    tableHead.innerHTML = headerRow;

    // Create table rows dynamically
    data.forEach(row => {
        let rowHtml = '<tr>';

        headers.forEach(header => {
            let cellValue = row[header];

            // If it looks like a URL, convert to clickable link
            if (cellValue && cellValue.startsWith("http")) {
                cellValue = `<a href="${cellValue}" target="_blank">Open Link</a>`;
            }

            rowHtml += `<td>${cellValue || ''}</td>`;
        });

        rowHtml += '</tr>';
        tableBody.innerHTML += rowHtml;
    });
}

</script>

</body>
</html>
